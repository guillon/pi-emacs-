name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox

      - name: Run test suite
        run: make test

      - name: Byte-compile Elisp files
        run: emacs -Q --batch -L lisp -L tests -f batch-byte-compile lisp/*.el tests/*.el
